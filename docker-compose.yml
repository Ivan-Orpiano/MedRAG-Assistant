version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medassist
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medassist}
      POSTGRES_DB: medassist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medassist"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: ./backend
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    volumes:
      - storage_data:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery worker --loglevel=INFO --concurrency=2
    env_file: .env
    volumes:
      - storage_data:/data/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_data:
  storage_data:
